<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>锤普降油记 | Bonk the Don: Oil Drop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar" aria-label="游戏状态">
        <div class="brand">
          <span class="brand-mark">BONK OIL</span>
          <div class="title-stack">
            <h1>锤普降油记</h1>
            <p>Bonk the Don: Oil Drop</p>
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <span>分数</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>连击</span>
            <strong id="combo">0</strong>
          </div>
          <div class="stat">
            <span>时间</span>
            <strong id="time">45</strong>
          </div>
        </div>
      </section>

      <section class="stage" aria-label="游戏区域">
        <canvas class="oil-chart" id="oilChart" aria-hidden="true"></canvas>
        <div class="oil-badge" aria-hidden="true">
          <svg class="oil-barrel-icon" viewBox="0 0 40 46" role="img">
            <ellipse cx="20" cy="8" rx="15" ry="6" />
            <path d="M5 8v30c0 3.3 6.7 6 15 6s15-2.7 15-6V8" />
            <ellipse cx="20" cy="38" rx="15" ry="6" />
            <path d="M6 18h28M6 29h28" />
            <text x="20" y="27" text-anchor="middle">OIL</text>
          </svg>
          <span>WTI OIL 国际油价</span>
        </div>
        <div class="stage-lights" aria-hidden="true"></div>
        <div class="board" id="board" aria-label="敲击洞口">
          <button class="hole" type="button" aria-label="洞口 1"></button>
          <button class="hole" type="button" aria-label="洞口 2"></button>
          <button class="hole" type="button" aria-label="洞口 3"></button>
          <button class="hole" type="button" aria-label="洞口 4"></button>
          <button class="hole" type="button" aria-label="洞口 5"></button>
          <button class="hole" type="button" aria-label="洞口 6"></button>
          <button class="hole" type="button" aria-label="洞口 7"></button>
          <button class="hole" type="button" aria-label="洞口 8"></button>
          <button class="hole" type="button" aria-label="洞口 9"></button>
        </div>
        <div class="spectators" aria-hidden="true">
          <div class="spectator putin">
            <span class="head"></span>
            <span class="body"></span>
            <span class="name">普京</span>
          </div>
          <div class="spectator biden">
            <span class="head"></span>
            <span class="body"></span>
            <span class="name">拜登</span>
          </div>
          <div class="spectator macron">
            <span class="head"></span>
            <span class="body"></span>
            <span class="name">马克龙</span>
          </div>
          <div class="spectator kim">
            <span class="head"></span>
            <span class="body"></span>
            <span class="name">金正恩</span>
          </div>
        </div>
        <div class="hammer" id="hammer" aria-hidden="true">
          <div class="hammer-head"></div>
          <div class="hammer-handle"></div>
        </div>
      </section>

      <section class="controls" aria-label="游戏控制">
        <button class="primary" id="startButton" type="button">开始</button>
        <button class="secondary" id="resetButton" type="button">重开</button>
        <div class="hint">打空涨油。</div>
      </section>
    </main>

    <div class="overlay show" id="overlay" role="dialog" aria-modal="true">
      <div class="modal">
        <p class="kicker">街机讽刺</p>
        <h2 id="overlayTitle">锤普降油记</h2>
        <p class="english-title">Bonk the Don: Oil Drop</p>
        <p id="overlayText">锤他，降油。</p>
        <button class="primary" id="overlayButton" type="button">开敲</button>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
